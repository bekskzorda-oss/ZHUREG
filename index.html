<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Love Page</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    overflow: hidden;
    transition: background 1s ease;
}

.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

.hidden { display: none; }

button {
    padding: 12px 24px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
}

#yesBtn { background:#00c853; color:white; }
#noBtn { background:#d50000; color:white; position:relative; }

.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-110vh); opacity:0; }
}

/* photos */
#photos img {
    width: 180px;
    margin: 10px;
    border-radius: 15px;
    display: none;
    animation: fadeIn 1s ease;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

@keyframes fadeIn {
    from {opacity:0; transform:scale(0.8);}
    to {opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen" class="screen">
    <h1>💖 Start</h1>
    <button onclick="startApp()">Start</button>
</div>

<!-- QUESTION -->
<div id="questionScreen" class="screen hidden">
    <h1 id="text">Сен мені ұнатасын ба? 💖</h1>

    <div>
        <button id="yesBtn">Иә</button>
        <button id="noBtn">Жоқ</button>
    </div>
</div>

<!-- FINAL -->
<div id="finalScreen" class="screen hidden">
    <h1>Урааа! Мен де сені жақсы көремін! ❤️✨</h1>

    <div id="photos">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
        <img src="photo3.jpg">
    </div>
</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="suluym.mp3" type="audio/mpeg">
</audio>

<script>
const startScreen = document.getElementById("startScreen");
const questionScreen = document.getElementById("questionScreen");
const finalScreen = document.getElementById("finalScreen");

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const text = document.getElementById("text");
const music = document.getElementById("music");

const photos = document.querySelectorAll("#photos img");

let yesSize = 18;
let phraseIndex = 0;

/* phrases */
const phrases = [
    "Иә дисін ғой",
    "Сенімдісің бе? 🤨",
    "Өтінемін 🥺",
    "Қайта ойланшы!",
    "Жүрегім ауырып тұр 💔",
    "Мұңайтпашы...",
    "Бәрібір ИӘ деп басшы ✨",
    "ТҮЙЙ БАСШЫ",
    "Сүйіттін ғо ия",
    "Қайта ойланып көрсей!",
    "Жасылды басасын!"
];

/* hearts */
function createHeart(){
    const h = document.createElement("div");
    h.classList.add("heart");
    h.innerText="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
}
setInterval(createHeart,300);

/* start */
function startApp(){
    startScreen.classList.add("hidden");
    questionScreen.classList.remove("hidden");
    music.play();
}

/* NO button */
noBtn.addEventListener("click", ()=>{

    text.innerText = phrases[phraseIndex];
    phraseIndex = (phraseIndex + 1) % phrases.length;

    yesSize += 6;
    yesBtn.style.fontSize = yesSize + "px";

    const x = Math.random()*300 - 150;
    const y = Math.random()*200 - 100;
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
});

/* YES button */
yesBtn.addEventListener("click", ()=>{

    questionScreen.classList.add("hidden");
    finalScreen.classList.remove("hidden");

    document.body.style.background =
        "linear-gradient(135deg,#ff4d6d,#ffb3c1)";

    // show photos
    photos.forEach(p => p.style.display="inline-block");
});
</script>

</body>
</html>
